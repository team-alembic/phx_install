name: CI

on:
  push:
    tags:
      - "v*"
    branches: [main]
  pull_request:

jobs:
  check:
    name: mix check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: team-alembic/staple-actions/actions/install-elixir@main
      - uses: team-alembic/staple-actions/actions/mix-check@main
        with:
          mix-env: test

  release:
    name: Release
    needs: check
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: team-alembic/staple-actions/actions/install-elixir@main

      - name: Extract release notes from CHANGELOG.md
        id: extract-notes
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          VERSION=${TAG_NAME#v}

          awk -v version="$VERSION" '
            /^## \[v?[0-9]/ {
              if (found) exit
              if (index($0, "[v" version "]") || index($0, "[" version "]")) {
                found = 1
                next
              }
            }
            found {
              if (/^## \[v?[0-9]/) exit
              print
            }
          ' CHANGELOG.md > release_notes.md

          if [ -s release_notes.md ]; then
            echo "has_notes=true" >> $GITHUB_OUTPUT
          else
            echo "has_notes=false" >> $GITHUB_OUTPUT
          fi

      - name: Create prerelease with changelog notes
        if: ${{ (contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') || contains(github.ref, '-pre')) && steps.extract-notes.outputs.has_notes == 'true' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          gh release create \
            --repo ${{ github.repository }} \
            --title ${GITHUB_REF#refs/tags/} \
            --prerelease \
            --notes-file release_notes.md \
            ${GITHUB_REF#refs/tags/}

      - name: Create prerelease with generated notes
        if: ${{ (contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') || contains(github.ref, '-pre')) && steps.extract-notes.outputs.has_notes != 'true' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          gh release create \
            --repo ${{ github.repository }} \
            --title ${GITHUB_REF#refs/tags/} \
            --prerelease \
            --generate-notes \
            ${GITHUB_REF#refs/tags/}

      - name: Create release with changelog notes
        if: ${{ (!contains(github.ref, '-rc') && !contains(github.ref, '-beta') && !contains(github.ref, '-alpha') && !contains(github.ref, '-pre')) && steps.extract-notes.outputs.has_notes == 'true' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          gh release create \
            --repo ${{ github.repository }} \
            --title ${GITHUB_REF#refs/tags/} \
            --notes-file release_notes.md \
            ${GITHUB_REF#refs/tags/}

      - name: Create release with generated notes
        if: ${{ (!contains(github.ref, '-rc') && !contains(github.ref, '-beta') && !contains(github.ref, '-alpha') && !contains(github.ref, '-pre')) && steps.extract-notes.outputs.has_notes != 'true' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          gh release create \
            --repo ${{ github.repository }} \
            --title ${GITHUB_REF#refs/tags/} \
            --generate-notes \
            ${GITHUB_REF#refs/tags/}

      - name: Publish to Hex
        uses: team-alembic/staple-actions/actions/mix-hex-publish@main
        with:
          mix-env: dev
          hex-api-key: ${{ secrets.HEX_API_KEY }}
